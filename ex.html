<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="./ex.css">
  <title>FLY SPORT</title>
  <link rel="icon" href="./img/photo_2023-11-05_11-47-27.jpg">
</head>
<body>
  <div class="container">
    <h1>Payment Page</h1>
  
    <form>
      <img class="background" src="./" alt="">
      <div class="form-group">
        <img src="./img/Old_Visa_Logo.svg.png" alt="">
        <img class="img" src="./img/Paypal-logo.png" alt="">
        <img src="./img/Mastercard-logo.svg.png" alt="">
        <label for="name">Name</label>
        <input type="text" id="name" name="name" required>
      </div>
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required>
      </div>
      <div class="form-group">
        <label for="card-number">Card Number</label>
        <input type="text" id="card-number" name="card-number" required>
      </div>
      <div class="form-group">
        <label for="expiry-date">Expiry Date</label>
        <input type="text" id="expiry-date" name="expiry-date" required>
      </div>
      <div class="form-group">
        <label for="cvv">CVV</label>
        <input type="text" id="cvv" name="cvv" required>
      </div>
      <div class="form-group">
        <label for="amount">Amount</label>
        <input type="number" id="amount" name="amount" required>
      </div>
      <button type="submit" class="btn">Pay Now</button>
      <a  style="margin-left: 250px; font-size: 20px; text-shadow: 10px; border: 100em;" href="https://t.me/+FqLyNJzn-w0wMTZl">Contact Us </a>
    </form>
  </div>
</body>
</html>
